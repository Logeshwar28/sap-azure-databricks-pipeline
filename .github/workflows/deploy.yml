name: SAP Databricks CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'sap_databricks_project/**'
      - 'Jobs/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Databricks CLI (new version)
      run: |
        curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
        databricks --version
        echo "✅ Databricks CLI installed"

    - name: Validate connection
      run: |
        databricks workspace list /
        echo "✅ Connected to Databricks!"

    - name: Deploy notebooks to Databricks
      run: |
        echo "🚀 Deploying notebooks..."
        
        databricks workspace mkdirs \
          /sap_databricks_project
        
        for notebook in sap_databricks_project/*.py; do
          name=$(basename "$notebook" .py)
          echo "Deploying: $name"
          databricks workspace import \
            --file "$notebook" \
            --language PYTHON \
            --overwrite \
            "/sap_databricks_project/$name"
        done
        
        echo "✅ All notebooks deployed!"

    - name: Verify deployment
      run: |
        echo "🔍 Verifying..."
        databricks workspace list /sap_databricks_project
        echo "✅ Deployment complete!"
